services:
  web:
    image: nginx:1.27-alpine
    container_name: maintenance-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEB_HOST_PORT:-8088}:80"
    volumes:
      - ./deploy/nginx-stack.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend

  api:
    build:
      context: ./MaintenanceApp
      dockerfile: MaintenanceApp.API/Dockerfile
    container_name: maintenance-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${MYSQL_CONNECTION_STRING}
      Jwt__Issuer: ${JWT_ISSUER:-MaintenanceApp}
      Jwt__Audience: ${JWT_AUDIENCE:-MaintenanceApp.Frontend}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__ExpiresHours: ${JWT_EXPIRES_HOURS:-8}
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN}
      Swagger__Enabled: ${SWAGGER_ENABLED:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - maintenance-api-logs:/app/logs

  frontend:
    build:
      context: ./Frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    container_name: maintenance-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      - api

volumes:
  maintenance-api-logs:
